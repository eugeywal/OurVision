<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ourVision - Professional Upload</title>
</head>
<body>
    <div class="main-container">
        <h1 class="pageTitle">Hola in <span>OurVision</span></h1>
        
        <form action="" class="upload-form">
            <div class="form-group">
                <label for="URL">YouTube Video URL</label>
                <input type="url" name="Url" id="URL" placeholder="https://example.com/video">
            </div>

            <div class="form-group">
                <label for="fileUpload">Upload Local Video</label>
                <input type="file" name="fileUpload" id="fileUpload">
            </div>

            <div class="form-group">
                <label for="driveFileUpload">Upload Drived Video Google Drive</label>
                <input type="file" name="driveFileUpload" id="driveFileUpload">
            </div>

            <button type="submit" class="sub">Go</button>
        </form>
    </div>
</body>
</html>
